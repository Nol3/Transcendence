<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Poker Race - Juego de Cartas</title>
  <style>
    * {
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background-color: #0d4a1c;
      background-image:
        url('/game-assets/tapete/tapete.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      pointer-events: none;
      z-index: 0;
    }
    #canvas-container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      max-width: 1280px;
      max-height: 720px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
      outline: none;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffe600;
      font-size: 24px;
      letter-spacing: 0.15em;
      text-shadow: 0 0 8px rgba(255, 230, 0, 0.8);
      text-align: center;
      pointer-events: none;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <div id="loading">Cargando Poker Race...</div>
  </div>
  <script>
    // Force WebGL alpha channel transparency so Raylib's black background
    // is composited as transparent, revealing the tapete behind the canvas.
    (function () {
      var _getCtx = HTMLCanvasElement.prototype.getContext;
      HTMLCanvasElement.prototype.getContext = function (type, attrs) {
        if (type === 'webgl2' || type === 'webgl') {
          attrs = Object.assign({}, attrs || {}, { alpha: true, premultipliedAlpha: false });
        }
        return _getCtx.call(this, type, attrs);
      };

      function patchClearColor(proto) {
        var _orig = proto.clearColor;
        proto.clearColor = function (r, g, b) {
          return _orig.call(this, r, g, b, 0);
        };
      }
      if (window.WebGL2RenderingContext) patchClearColor(WebGL2RenderingContext.prototype);
      if (window.WebGLRenderingContext)  patchClearColor(WebGLRenderingContext.prototype);
    })();
  </script>
  <script>
    var Module = {
      canvas: document.getElementById("canvas"),
      onRuntimeInitialized: function () {
        document.getElementById("loading").classList.add("hidden");
      }
    };
  </script>
  <script async src="index.js"></script>
</body>
</html>
