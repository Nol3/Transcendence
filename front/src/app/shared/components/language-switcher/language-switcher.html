<div class="lang-switcher" [class.lang-switcher--open]="open()">
  <button class="lang-switcher__trigger font-pixel" (click)="toggle()" [attr.aria-expanded]="open()" aria-haspopup="listbox">
    <span>{{ currentLang.flag }}</span>
    <span>{{ currentLang.code | uppercase }}</span>
    <span class="lang-switcher__arrow">{{ open() ? '▲' : '▼' }}</span>
  </button>

  @if (open()) {
    <ul class="lang-switcher__dropdown animate-slide-up" role="listbox">
      @for (lang of languages; track lang.code) {
        <li
          role="option"
          [attr.aria-selected]="lang.code === current()"
          [class.lang-switcher__option--active]="lang.code === current()"
          class="lang-switcher__option font-pixel"
          (click)="select(lang.code)"
        >
          <span>{{ lang.flag }}</span>
          <span>{{ lang.label }}</span>
        </li>
      }
    </ul>
  }
</div>
