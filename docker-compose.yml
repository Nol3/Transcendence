version: '3.9'

services:
  # ==========================================
  # Backend Service (Django + FastAPI)
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ft_transcendence_backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DEBUG=${DJANGO_DEBUG:-false}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DB_ENGINE=${DB_ENGINE}
      - DB_NAME=${DB_NAME}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    volumes:
      - ./backend:/app
      - ./backend/db.sqlite3:/app/db.sqlite3
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - transcendence-network
    depends_on:
      - nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # Frontend Service (Angular + Nginx)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: ft_transcendence_frontend
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    environment:
      - NG_ENV=${NG_ENV:-development}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ng serve --host 0.0.0.0 --poll 2000
    networks:
      - transcendence-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================
  # Reverse Proxy (Nginx)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: ft_transcendence_nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    networks:
      - transcendence-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

# ==========================================
# Networks
# ==========================================
networks:
  transcendence-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  backend_data:
    driver: local
  frontend_data:
    driver: local
